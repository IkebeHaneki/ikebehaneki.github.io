<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
  --bg: #fff6fb;
  --card: rgba(255, 255, 255, 0.88);
  --text: #3a3042;
  --muted: #8a7f91;
  --link: #4f8cff;
  --link-hover: #7c5cff;
  --border: #f4d7e8;
  --soft: #fff0f7;
  --blue-soft: #eef7ff;
  --purple-soft: #f4efff;
}

    * {
      box-sizing: border-box;
    }

    body {
  max-width: 980px;
  margin: 0 auto;
  padding: 32px 22px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", Arial, sans-serif;
  line-height: 1.8;
  color: var(--text);
  background:
  radial-gradient(circle at top left, rgba(255, 184, 214, 0.55) 0, transparent 330px),
  radial-gradient(circle at top right, rgba(180, 220, 255, 0.55) 0, transparent 360px),
  radial-gradient(circle at 50% 20%, rgba(220, 200, 255, 0.35) 0, transparent 420px),
  linear-gradient(180deg, #fff8fc 0%, #f8f1ff 48%, #eef8ff 100%);
}

    header {
      margin-bottom: 34px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .site-title {
      display: inline-block;
      margin-bottom: 16px;
      font-size: 34px;
      font-weight: 800;
      letter-spacing: 0.5px;
      text-decoration: none;
      color: #222;
    }

    .site-title:hover {
      color: var(--link);
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    nav a {
  display: inline-block;
  padding: 7px 15px;
  border: 1px solid var(--border);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.75);
  color: #6a5476;
  text-decoration: none;
  font-size: 15px;
  box-shadow: 0 4px 12px rgba(255, 130, 180, 0.10);
  transition: all 0.2s ease;
    }

    nav a:hover {
  background: linear-gradient(135deg, #ffb8d8, #b8ddff);
  border-color: transparent;
  color: white;
  text-decoration: none;
  transform: translateY(-2px);
  box-shadow: 0 8px 18px rgba(255, 120, 170, 0.22);
    }

    nav a.active {
  background: linear-gradient(135deg, #ff8fc7, #9fd4ff);
  border-color: transparent;
  color: white;
  box-shadow: 0 8px 18px rgba(255, 120, 170, 0.22);
}

    main {
      background: var(--card);
      padding: 38px 42px;
      border: 1px solid rgba(244, 215, 232, 0.9);
      border-radius: 26px;
      box-shadow: 0 18px 45px rgba(130, 90, 150, 0.10);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin-top: 0;
      font-size: 34px;
      line-height: 1.35;
      letter-spacing: 0.5px;
    }

    h2 {
      margin-top: 34px;
      font-size: 26px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }

    h3 {
      margin-top: 24px;
      font-size: 21px;
    }

    p {
      margin: 14px 0;
    }

    a {
      color: var(--link);
      text-decoration: none;
    }

    a:hover {
      color: var(--link-hover);
      text-decoration: underline;
    }

    ul {
      padding-left: 24px;
    }

    li {
      margin: 5px 0;
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0;
    }

    .post-meta {
      color: var(--muted);
      font-size: 14px;
      margin-top: -8px;
      margin-bottom: 24px;
    }

    .post-page h1 {
  margin-bottom: 10px;
}

.post-content {
  margin-top: 26px;
}

.post-content img {
  max-width: 100%;
  border-radius: 14px;
  margin: 18px 0;
}

.post-content p {
  font-size: 16px;
}

    .hero {
  position: relative;
  overflow: hidden;
  padding: 34px 34px;
  margin-bottom: 34px;
  border-radius: 28px;
  background:
    linear-gradient(135deg, rgba(255, 240, 247, 0.98), rgba(238, 247, 255, 0.98));
  border: 1px solid var(--border);
  box-shadow: 0 12px 28px rgba(255, 130, 180, 0.10);
}
    
.hero::after {
  content: "✦";
  position: absolute;
  right: 28px;
  top: 18px;
  font-size: 54px;
  color: rgba(255, 143, 199, 0.28);
}
    
.hero-kicker {
  margin: 0 0 8px;
  color: #e46aa5;
  font-size: 14px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  font-weight: 700;
}

.hero h1 {
  margin: 0 0 12px;
  font-size: 40px;
  color: #3a3042;
}

.hero-text {
  max-width: 720px;
  color: #444;
  margin: 8px 0;
}

    .post-card {
      padding: 24px 26px;
  margin: 24px 0;
  border: 1px solid var(--border);
  border-radius: 22px;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(255,248,252,0.95) 100%);
  box-shadow: 0 10px 24px rgba(255, 130, 180, 0.10);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    
    .post-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 16px 34px rgba(255, 120, 170, 0.18);
    }

    .post-card h2,
    .post-card h3 {
      margin-top: 0;
      border-bottom: none;
      padding-bottom: 0;
    }

    .post-card-title {
        font-size: 26px;
        font-weight: 800;
        margin-bottom: 10px;
        line-height: 1.4;
    }

    .post-card-title a {
        color: #4f8cff;
        font-weight: 800;
        text-decoration: none;
        -webkit-text-fill-color: initial;
    }

    .post-card-title a:hover {
        color: #7c5cff;
        text-decoration: none;
        opacity: 1;
        -webkit-text-fill-color: initial;
    }

    .post-card-meta {
      color: var(--muted);
      font-size: 14px;
      margin: 6px 0 14px;
    }

    .read-more {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 14px;
      border-radius: 999px;
      background: linear-gradient(135deg, #fff0f7, #eef7ff);
      border: 1px solid var(--border);
      color: #6a5476;
      font-size: 14px;
    }

    .read-more:hover {
      background: linear-gradient(135deg, #ff8fc7, #9fd4ff);
      color: white;
      text-decoration: none;
    }

    .filter-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 18px 0 28px;
    }

    .filter-buttons button {
      padding: 7px 13px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fffaf2;
      color: #333;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .filter-buttons button:hover {
      background: var(--text);
      color: white;
      border-color: var(--text);
      transform: translateY(-1px);
    }

    footer {
      margin-top: 42px;
      padding-top: 22px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      text-align: center;
      font-size: 14px;
    }

    code {
      padding: 2px 5px;
      border-radius: 5px;
      background: #f3eee7;
      font-family: "SFMono-Regular", Consolas, monospace;
    }

    blockquote {
      margin: 20px 0;
      padding: 12px 18px;
      border-left: 4px solid var(--border);
      background: #fffaf2;
      color: #555;
    }

    @media (max-width: 700px) {
      .hero h1 {
  font-size: 30px;
      }
      
      body {
        padding: 22px 14px;
      }

      .site-title {
        font-size: 30px;
      }

      main {
        padding: 26px 22px;
        border-radius: 16px;
      }

      h1 {
        font-size: 29px;
      }

      h2 {
        font-size: 23px;
      }

      nav a {
        font-size: 14px;
        padding: 5px 11px;
      }
    }
  </style>
</head>

<body>
  <header>
    <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>

<nav>
  <a class="{% if page.url == '/' %}active{% endif %}" href="{{ '/' | relative_url }}">🏠 Home</a>
  <a class="{% if page.url contains '/blog' %}active{% endif %}" href="{{ '/blog.html' | relative_url }}">🌸 Blog</a>
  <a class="{% if page.url contains '/life' %}active{% endif %}" href="{{ '/life.html' | relative_url }}">☁️ Life</a>
  <a class="{% if page.url contains '/notes' %}active{% endif %}" href="{{ '/notes.html' | relative_url }}">📘 Notes</a>
  <a class="{% if page.url contains '/games' %}active{% endif %}" href="{{ '/games.html' | relative_url }}">🎮 Games</a>
  <a class="{% if page.url contains '/novels' %}active{% endif %}" href="{{ '/novels.html' | relative_url }}">📖 Novels</a>
  <a class="{% if page.url contains '/random' %}active{% endif %}" href="{{ '/random.html' | relative_url }}">✨ Random</a>
  <a class="{% if page.url contains '/about' %}active{% endif %}" href="{{ '/about.html' | relative_url }}">🫧 About</a>
</nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    © {{ site.time | date: "%Y" }} {{ site.title }} · Powered by GitHub Pages
  </footer>
</body>
</html>
