---
layout: default
---

<article class="post-page">
  <p class="post-meta">
    {{ page.date | date: "%Y-%m-%d" }}
    {% if page.categories %}
    · Category: {{ page.categories | join: ", " }}
    {% endif %}
  </p>

  <h1>{{ page.title }}</h1>

  <div class="post-content">
    {{ content }}
  </div>

  <hr>

  <p>
    <a class="read-more" href="{{ '/blog.html' | relative_url }}">← Back to Blog</a>
  </p>
</article>
