---
layout: default
---

<article>
  <h1>{{ page.title }}</h1>

  <p class="post-meta">
    {{ page.date | date: "%Y-%m-%d" }}
    {% if page.categories %}
    · Category: {{ page.categories | join: ", " }}
    {% endif %}
  </p>

  {{ content }}

  <hr>

  <p>
    <a href="{{ '/blog.html' | relative_url }}">← Back to Blog</a>
  </p>
</article>
